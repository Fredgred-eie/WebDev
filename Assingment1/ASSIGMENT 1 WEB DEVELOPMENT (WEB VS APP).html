<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparison: Web vs App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 15px;
      background-color: #333;
      color: white;
    }

    .comparison {
      display: flex;
      height: 90vh;
    }

    .box {
      width: 50%;
      padding: 30px;
      color: white;

      background-size: cover;
      background-position: center;
    }

    .Web {
      background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://bairesdev.mo.cloudinary.net/blog/2023/11/Web-2.0-vs.-Web-3.0.jpg?tx=w_1920,q_auto');
    }

    .App {
      background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://bairesdev.mo.cloudinary.net/blog/2023/10/Steps-of-Mobile-App-Development.jpg?tx=w_1920,q_auto');
    }

    h2 {
      margin-top: 0;
    }

    ul {
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <h1>Comparison: Web vs App</h1>

  <div class="comparison">
    <div class="box Web">
      <h2>Web</h2>
      <ul>
        <li>Runs in browser</li>
        <li>No installation needed</li>
        <li>Requires internet</li>
        <li>Cross-platform</li>
      </ul>
    </div>

    <div class="box App">
      <h2>App</h2>
      <ul>
        <li>Installed on device</li>
        <li>Can work offline</li>
        <li>Faster performance</li>
        <li>Uses device features</li>
      </ul>
    </div>
  </div>

</body>
</html>
